<div class="mx-auto max-w-3xl space-y-4">
    <button routerLink="/home"
        class="px-3.5 py-2 flex items-center gap-2 rounded-[8px] border border-slate-200 bg-white  text-sm font-bold text-slate-700 transition hover:bg-slate-50">
        <i class="fa-solid fa-arrow-left"></i>
        Back</button>
    @if(isLoaded){
    <app-single-post [post]="selectedPost"></app-single-post>
    }
    <article [hidden]="isLoaded" class="overflow-visible bg-white border border-slate-200 rounded-xl shadow-sm mb-4 text-center p-5
    font-semibold text-slate-400">
        Loading...
    </article>
</div>
