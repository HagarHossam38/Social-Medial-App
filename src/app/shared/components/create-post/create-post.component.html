<div class="create-post rounded-2xl border border-slate-200 bg-white p-4 shadow-sm mb-4">
    <form action=""></form>
    <div class="mb-3 flex gap-3 items-start">
        <img [src]="loggedInUser.photo?? '/images/profile.png'" [alt]="loggedInUser.name"
            class="h-11 w-11 rounded-full object-cover">
        <div class="flex-1">
            <p class="text-base font-extrabold text-slate-900">{{loggedInUser.name}}</p>
            <div
                class="mt-1 px-2 py-0.5 inline-flex items-center gap-2 rounded-full bg-slate-100 text-xs font-semibold text-slate-700">
                <i class="fa-solid fa-earth-africa"></i>
                <select name="postPrivacy" id="postPrivacy"
                    class="bg-transparent outline-none border-0 py-1 text-xs font-semibold text-slate-700 pe-4 ps-0 ">
                    <option value="Public">Public</option>
                    <option value="Followers">Followers</option>
                    <option value="Only me">Only me</option>
                </select>
            </div>
        </div>
    </div>


    <div>
        <textarea id="message" rows="4" [formControl]="postBody"
            class="bg-slate-50 border border-slate-200 rounded-2xl w-full  px-4 py-3 text-[17px] leading-relaxed text-slate-800 outline-none transition focus:border-[#1877f2] focus:bg-white"
            placeholder=" What's on your mind, {{loggedInUser.name}}?"></textarea>
    </div>
    @if(previewUrl!=null){
    <div class="previewUploadedimg relative mt-2">
        <img [src]="previewUrl" alt="Preview" class="max-h-60 w-full object-cover">
        <button class="absolute top-2 right-2" (click)="removePreviewImg()">
            <i class="fa-solid fa-circle-xmark text-black/60 fa-xl"></i>
        </button>
    </div>
    }

    <div class="border-t border-border mt-3 pt-3 flex flex-wrap justify-between items-center gap-2">
        <div class="relative flex gap-2 items-center">
            <label
                class="upload-phote flex cursor-pointer items-center gap-2 rounded-lg px-3 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100">
                <i class="fa-regular fa-image text-emerald-600"></i>
                <span class="hidden sm:inline">Photo/video</span>
                <input accept="image/*" class="hidden" type="file" (change)="onImageSelected($event)">
            </label>

            <div class="emoji-picker" #emojiContainer>
                <button
                    class="rounded-lg px-3 py-2  flex items-center gap-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100"
                    (click)="toggleEmojiPicker()">
                    <i class="fa-regular fa-face-smile" style="color: rgb(255, 212, 59);"></i>
                    Feeling/activity</button>

                @if (showEmojiPicker) {
                <div class="absolute left-0  rounded-2xl bg-white border border-slate-200 shadow-2xl overflow-hidden"
                    (click)="$event.stopPropagation()">
                    <emoji-mart #emojiMart (emojiSelect)="addEmoji($event)"></emoji-mart>
                </div>
                }
            </div>
        </div>

        <div>
            <button (click)="createPost()" [disabled]="postBody.invalid"
                class="px-5 py-2 bg-[#1877f2] shadow-sm rounded-[8px] text-sm font-extrabold text-white  flex items-center gap-2 transition hover:bg-[#166fe5] disabled:opacity-60! disabled:cursor-not-allowed! disabled:hover:bg-[#1877f2]">
                Post
                <i class="fa-regular fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>
